# nginx reverse proxy config - navi-vokabeltrainer
# Ziel: /etc/nginx/sites-available/navi-vokabeltrainer auf der LXC,
# symlink nach sites-enabled, alte default-Konfiguration entfernen.
#
# server_tokens off unterdrueckt die nginx-Versionsnummer im Server-Header
# dieser Ebene (Defense-in-Depth) - der oeffentlich sichtbare
# "Server: openresty"-Header stammt aber von der VORGESCHALTETEN, externen
# Nginx Proxy Manager-Instanz auf einem anderen Host, nicht von hier; dessen
# Header-Konfiguration liegt ausserhalb dieses Projekts/Repos.
# Diese Ebene wird selbst nur ueber HTTP (Port 80) vom vorgeschalteten,
# externen Nginx Proxy Manager angesprochen - der eigentliche Client
# spricht TLS nur bis zum NPM. $scheme ist hier deshalb IMMER "http" und
# darf X-Forwarded-Proto NICHT einfach ueberschreiben, sonst haelt Express
# (trust proxy) jede Anfrage faelschlich fuer unverschluesselt. Der vom NPM
# bereits gesetzte Header wird daher durchgereicht, mit $scheme nur als
# Fallback falls er fehlt (z.B. direkter Zugriff ohne NPM davor).
map $http_x_forwarded_proto $navi_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    listen [::]:80;
    server_name navi.diy-ehome.de _;
    server_tokens off;

    location / {
        proxy_pass http://127.0.0.1:3700;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $navi_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
